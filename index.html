<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Aesthetic Mess Marketing Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        :root {
            /* Light Mode: Shinkai's Golden Hour Afternoon */
            --bg-base: #f0f4f9;
            --anime-sky: linear-gradient(180deg, #74b9ff 0%, #fab1a0 60%, #ffeaa7 100%);
            --panel-glass: rgba(255, 255, 255, 0.45);
            --card-glass: rgba(255, 255, 255, 0.65);
            --border-glass: 1px solid rgba(255, 255, 255, 0.6);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --primary-gradient: linear-gradient(135deg, #0984e3, #6c5ce7);
            --accent: #e17055;
            --neon-glow: 0 8px 32px 0 rgba(31, 38, 135, 0.08);
            --card-shadow: inset 2px 2px 5px rgba(255,255,255,0.5), 4px 4px 15px rgba(0,0,0,0.05);
            --cloud-opacity: 0.85;
            --star-display: none;
        }

        [data-theme="dark"] {
            /* Dark Mode: Your Name's Cosmic Twilight (Deep Indigo, Sunset Violet & Neon Teal) */
            --bg-base: #0a0a23;
            --anime-sky: linear-gradient(180deg, #050515 0%, #1a0b2e 40%, #48134a 75%, #101233 100%);
            --panel-glass: rgba(18, 12, 38, 0.55);
            --card-glass: rgba(30, 24, 61, 0.65);
            --border-glass: 1px solid rgba(168, 85, 247, 0.3);
            --text-main: #f8fafc;
            --text-muted: #cbd5e1;
            --primary-gradient: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            --accent: #f43f5e;
            --neon-glow: 0 0 25px rgba(168, 85, 247, 0.4), inset 0 0 15px rgba(0, 242, 254, 0.1);
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            --cloud-opacity: 0.4;
            --star-display: block;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ANIME SKY BACKGROUND ENVIRONMENT --- */
        .anime-sky-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--anime-sky);
            z-index: -3;
            transition: background 1s ease;
        }

        /* Fluffy Shinkai-style Anime Clouds */
        .anime-clouds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            opacity: var(--cloud-opacity);
            transition: opacity 1s ease;
        }

        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.35);
            filter: blur(30px);
            border-radius: 50%;
            animation: cloudFloat infinite linear;
        }

        /* Light Mode clouds get warmer peach tints, Dark mode gets deep purple hues */
        .cloud-1 { width: 500px; height: 250px; top: 10%; left: -10%; background: rgba(255, 177, 160, 0.4); animation-duration: 90s; }
        .cloud-2 { width: 600px; height: 300px; bottom: 5%; right: -20%; background: rgba(255, 234, 167, 0.3); animation-duration: 120s; }
        [data-theme="dark"] .cloud-1 { background: rgba(139, 92, 246, 0.2); }
        [data-theme="dark"] .cloud-2 { background: rgba(244, 63, 94, 0.15); }

        @keyframes cloudFloat {
            0% { transform: translateX(0px) translateY(0px); }
            50% { transform: translateX(50px) translateY(15px); }
            100% { transform: translateX(0px) translateY(0px); }
        }

        /* Shooting Stars for Twilight Dark Mode */
        .star-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -2;
            display: var(--star-display);
            pointer-events: none;
        }

        .shooting-star {
            position: absolute;
            top: 0;
            left: 50%;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            animation: shooting infinite linear;
            opacity: 0;
        }

        .star-1 { top: 5%; left: 30%; animation-duration: 6s; animation-delay: 1s; }
        .star-2 { top: 15%; left: 70%; animation-duration: 8s; animation-delay: 4s; }

        @keyframes shooting {
            0% { transform: translateX(0) translateY(0) scale(1); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translateX(-300px) translateY(300px) scale(0.2); opacity: 0; }
            100% { opacity: 0; }
        }

        /* --- DASHBOARD CONTAINER --- */
        .container {
            width: 100%;
            max-width: 1050px;
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--border-glass);
            border-radius: 32px;
            padding: 45px;
            box-shadow: var(--neon-glow);
            position: relative;
            z-index: 1;
        }

        /* Anime Theme Controller Buttons */
        .top-controls {
            position: absolute;
            top: 30px;
            right: 45px;
            display: flex;
            gap: 15px;
        }

        .control-btn {
            background: var(--card-glass);
            border: var(--border-glass);
            color: var(--text-main);
            padding: 12px 20px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(5px);
        }

        .control-btn:hover {
            transform: translateY(-2px);
        }

        .download-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
        }

        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-family: 'Comfortaa', sans-serif;
            font-size: 36px;
            font-weight: 700;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        header p {
            color: var(--text-muted);
            font-size: 15px;
            font-weight: 500;
        }

        /* Input Controls Reskin */
        .setup-section {
            display: flex;
            gap: 25px;
            margin-bottom: 45px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .form-group {
            flex: 1;
            min-width: 250px;
        }

        label {
            display: block;
            margin-bottom: 12px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        select {
            width: 100%;
            padding: 16px 22px;
            border-radius: 18px;
            border: var(--border-glass);
            background: var(--card-glass);
            color: var(--text-main);
            font-size: 15px;
            font-weight: 600;
            outline: none;
            box-shadow: var(--card-shadow);
            cursor: pointer;
        }

        .gen-btn {
            width: 100%;
            padding: 16px 22px;
            border-radius: 18px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.3);
            transition: all 0.3s ease;
        }

        .gen-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 26px rgba(108, 92, 231, 0.45);
        }

        /* Dual Grid Workspace */
        .results-grid {
            display: grid;
            grid-template-columns: 1.7fr 1.3fr;
            gap: 35px;
        }

        @media (max-width: 850px) {
            .results-grid { grid-template-columns: 1fr; }
            header { margin-top: 40px; }
        }

        .panel {
            background: var(--panel-glass);
            border-radius: 26px;
            padding: 30px;
            border: var(--border-glass);
            box-shadow: var(--card-shadow);
            max-height: 620px;
            overflow-y: auto;
        }

        .panel h2 {
            font-family: 'Comfortaa', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 25px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Beautiful Dynamic Tables */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }

        th {
            padding: 0 14px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
        }

        td {
            padding: 16px;
            background: var(--card-glass);
            color: var(--text-main);
            font-weight: 600;
            font-size: 14px;
            border: var(--border-glass);
        }

        tr td:first-child {
            border-top-left-radius: 16px;
            border-bottom-left-radius: 16px;
            color: var(--accent);
            font-weight: 700;
        }
        tr td:last-child {
            border-top-right-radius: 16px;
            border-bottom-right-radius: 16px;
        }

        /* Grid Cards for Stats */
        .summary-list {
            list-style: none;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 16px;
        }

        .summary-list li {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 18px 14px;
            background: var(--card-glass);
            border-radius: 20px;
            font-weight: 600;
            border: var(--border-glass);
            box-shadow: var(--card-shadow);
            gap: 10px;
        }

        .summary-list li .name {
            font-size: 14px;
        }

        .summary-list li span.count {
            font-weight: 800;
            color: white;
            background: var(--primary-gradient);
            padding: 5px 14px;
            border-radius: 12px;
            font-size: 11px;
        }

        /* Scrollbars Customization */
        .panel::-webkit-scrollbar { width: 6px; }
        .panel::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
        [data-theme="dark"] .panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<!-- Anime Sky Animated Vectors -->
<div class="anime-sky-bg"></div>
<div class="anime-clouds">
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
</div>
<div class="star-container">
    <div class="shooting-star star-1"></div>
    <div class="shooting-star star-2"></div>
</div>

<div class="container">
    <!-- Top Action Area -->
    <div class="top-controls">
        <button class="control-btn download-btn" onclick="downloadDashboardAsImage()" id="downloadBtn" style="display: none;">
            ✨ Export Image
        </button>
        <button class="control-btn" onclick="toggleTheme()" id="themeBtn">
            🌌 Twilight UI
        </button>
    </div>

    <header>
        <h1>Mess Marketing Hub</h1>
        <p>Equal spell distribution engine for 11 members (2 meals/day)</p>
    </header>

    <div class="setup-section">
        <div class="form-group">
            <label for="monthSelect">Choose Target Month</label>
            <select id="monthSelect">
                <option value="1">🌸 January</option>
                <option value="2">❄️ February</option>
                <option value="3">🌱 March</option>
                <option value="4">☀️ April</option>
                <option value="5">🌿 May</option>
                <option value="6">☔ June</option>
                <option value="7">🌾 July</option>
                <option value="8">☁️ August</option>
                <option value="9">🍁 September</option>
                <option value="10">🎃 October</option>
                <option value="11">🍂 November</option>
                <option value="12">🎄 December</option>
            </select>
        </div>
        <div class="form-group">
            <button class="gen-btn" onclick="generateSchedule()">☄️ Run Distribution</button>
        </div>
    </div>

    <div class="results-grid" id="resultsGrid" style="display: none;">
        <!-- Left Side: Main Schedule -->
        <div class="panel" id="schedulePanel">
            <h2>📊 Daily Duty Chart</h2>
            <table>
                <thead>
                    <tr>
                        <th>Day</th>
                        <th>Lunch Duty</th>
                        <th>Dinner Duty</th>
                    </tr>
                </thead>
                <tbody id="scheduleBody">
                    <!-- Data Rows -->
                </tbody>
            </table>
        </div>

        <!-- Right Side: Summary Counter Graphic Grid -->
        <div class="panel" id="statsPanel">
            <h2>💫 Fair Contribution Stats</h2>
            <ul class="summary-list" id="summaryList">
                <!-- Grid Items -->
            </ul>
        </div>
    </div>
</div>

<script>
    const members = [
        "Sandip", "Sudip", "Hridoy", "Sourov", "Bishal", 
        "Rahul", "Arup", "Prottoy", "Durjoy", "Noyon", "Hrittick"
    ];

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute("data-theme");
        const targetTheme = currentTheme === "dark" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", targetTheme);
        document.getElementById("themeBtn").innerHTML = targetTheme === "dark" ? "☀️ Light UI" : "🌌 Twilight UI";
    }

    function getDaysInMonth(month) {
        const daysMap = {
            1: 31, 2: 28, 3: 31, 4: 30, 5: 31, 6: 30,
            7: 31, 8: 31, 9: 30, 10: 31, 11: 30, 12: 31
        };
        return daysMap[month] || 0;
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function generateSchedule() {
        const monthSelect = document.getElementById("monthSelect");
        const month = parseInt(monthSelect.value);
        const days = getDaysInMonth(month);
        
        const numMembers = members.length;
        const totalSlots = days * 2;

        const baseDutiesPerMember = Math.floor(totalSlots / numMembers);
        const remainder = totalSlots % numMembers;

        let spellLengths = new Array(numMembers).fill(baseDutiesPerMember);

        let indices = Array.from({length: numMembers}, (_, i) => i);
        shuffleArray(indices);
        for (let i = 0; i < remainder; i++) {
            spellLengths[indices[i]]++;
        }

        let shuffledOrder = [...members];
        shuffleArray(shuffledOrder);

        let dutyPool = [];
        for (let i = 0; i < numMembers; i++) {
            const currentMember = shuffledOrder[i];
            const personalTotalDuty = spellLengths[i];
            for (let j = 0; j < personalTotalDuty; j++) {
                dutyPool.push(currentMember);
            }
        }

        // Render Data
        const scheduleBody = document.getElementById("scheduleBody");
        scheduleBody.innerHTML = "";
        let poolIndex = 0;
        for (let day = 1; day <= days; day++) {
            const row = `<tr>
                <td>Day ${day}</td>
                <td>${dutyPool[poolIndex++]}</td>
                <td>${dutyPool[poolIndex++]}</td>
            </tr>`;
            scheduleBody.insertAdjacentHTML('beforeend', row);
        }

        const summaryList = document.getElementById("summaryList");
        summaryList.innerHTML = "";
        let counts = {};
        members.forEach(m => counts[m] = 0);
        dutyPool.forEach(m => counts[m]++);

        members.forEach(member => {
            const listItem = `<li>
                <div class="name">${member}</div>
                <span class="count">${counts[member]} Meals</span>
            </li>`;
            summaryList.insertAdjacentHTML('beforeend', listItem);
        });

        document.getElementById("resultsGrid").style.display = "grid";
        document.getElementById("downloadBtn").style.display = "flex";
    }

    function downloadDashboardAsImage() {
        const resultsGrid = document.getElementById("resultsGrid");
        const sPanel = document.getElementById("schedulePanel");
        const stPanel = document.getElementById("statsPanel");
        
        const oldS = sPanel.style.maxHeight;
        const oldSt = stPanel.style.maxHeight;
        sPanel.style.maxHeight = "none";
        stPanel.style.maxHeight = "none";

        const currentTheme = document.documentElement.getAttribute("data-theme");

        html2canvas(resultsGrid, {
            backgroundColor: currentTheme === "dark" ? "#1a0b2e" : "#fab1a0",
            scale: 2,
            useCORS: true
        }).then(canvas => {
            sPanel.style.maxHeight = oldS;
            stPanel.style.maxHeight = oldSt;

            const link = document.createElement("a");
            link.href = canvas.toDataURL("image/png");
            link.download = `Anime_Mess_Schedule_2026.png`;
            link.click();
        });
    }
</script>

</body>
</html>
